<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PropSafe — GPS Survey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0B1E3F;
      --accent: #00B4D8;
      --accent-soft: rgba(0, 180, 216, 0.18);
      --text: #e8f6ff;
      --muted: #9cb7cd;
      --danger: #ef4444;
      --success: #22c55e;
      --card: rgba(8, 22, 46, 0.92);
      --border: rgba(0, 180, 216, 0.32);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background: radial-gradient(circle at top, rgba(0, 180, 216, 0.14), transparent 55%), var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      width: min(880px, 94vw);
      margin: 24px auto 40px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .title {
      font-family: 'Syne', sans-serif;
      font-size: 30px;
      margin: 0;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .back {
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--border);
      background: var(--accent-soft);
      padding: 8px 12px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      margin-bottom: 5px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.18);
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.2);
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 8px 0 14px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      color: #06263a;
      background: linear-gradient(135deg, #00B4D8, #3fd0eb);
    }

    .btn.alt {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--border);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .counter {
      font-size: 15px;
      font-weight: 700;
      margin: 6px 0;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
      min-height: 20px;
    }

    .corners {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.14);
      margin-bottom: 14px;
    }

    .corners h3 {
      margin: 0 0 8px;
      font-size: 14px;
      color: var(--accent);
      font-family: 'Syne', sans-serif;
    }

    .corners ol {
      margin: 0;
      padding-left: 18px;
      max-height: 220px;
      overflow: auto;
    }

    .corners li {
      margin-bottom: 6px;
      color: var(--text);
      font-size: 13px;
    }

    .result {
      display: none;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.16);
      padding: 14px;
    }

    .result.show {
      display: block;
    }

    .line {
      font-size: 13.5px;
      margin-bottom: 6px;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .badge.match {
      color: var(--success);
      border: 1px solid rgba(34, 197, 94, 0.4);
      background: rgba(34, 197, 94, 0.13);
    }

    .badge.mismatch {
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.45);
      background: rgba(239, 68, 68, 0.14);
    }

    .map-container {
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 14px;
      height: 360px;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .map-info {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 13px;
      border: 1px solid var(--border);
    }

    .map-info.active {
      background: rgba(34, 197, 94, 0.15);
      border-color: rgba(34, 197, 94, 0.4);
    }

    .map-info strong {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="header">
      <div>
        <h1 class="title">📍 GPS Survey</h1>
        <p class="sub">Mark property corners using current GPS location and verify against registered area.</p>
      </div>
      <a class="back" href="index.html">← Back</a>
    </div>

    <section class="card">
      <div class="field">
        <label for="propertyId">Property ID</label>
        <input id="propertyId" class="input" type="text" placeholder="e.g. PROP-TN-2026-001" />
      </div>

      <div class="field">
        <label for="registeredArea">Registered Area (sq.m)</label>
        <input id="registeredArea" class="input" type="number" min="0" step="0.01" placeholder="e.g. 185.75" />
      </div>

      <div class="row">
        <button id="getLocationBtn" class="btn">Get My Location</button>
        <button id="markCornerBtn" class="btn alt" disabled>Mark Corner</button>
        <button id="completeSurveyBtn" class="btn" disabled>Complete Survey</button>
        <button id="resetBtn" class="btn alt">Reset</button>
      </div>

      <div class="counter" id="cornerCounter">Corners marked: 0</div>
      <div class="status" id="statusText">Tap “Get My Location” to start.</div>
      <div class="map-info" id="map-info">
        <strong>📍 Area Calculation:</strong> <span id="areaDisplay">Waiting for corners...</span>
      </div>

      <div class="map-container">
        <div id="map"></div>
      </div>
      <div class="corners">
        <h3>Marked Corners</h3>
        <ol id="cornersList"></ol>
      </div>

      <div id="resultCard" class="result"></div>
    </section>
  </main>

  <!-- Google Maps API will be loaded dynamically from config -->
  <script id="googlemaps-script"></script>
  <script type="module" src="js/gps-survey.js"></script>
</body>
</html>
